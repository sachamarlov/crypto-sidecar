# Pre-commit hooks for GuardiaBox
# Install:    uv run pre-commit install --install-hooks
# Run all:    uv run pre-commit run --all-files
# Update:     uv run pre-commit autoupdate
#
# Hooks are deterministic gatekeepers — keep this file authoritative.

default_install_hook_types: [pre-commit, commit-msg, pre-push]
default_language_version:
  python: python3.12
fail_fast: false

repos:
  # ------------------------------------------------------------------
  # Generic hygiene
  # ------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-toml
      - id: check-json
        exclude: |
          (?x)^(
              src/guardiabox/ui/tauri/frontend/.*\.json|
              src/guardiabox/ui/tauri/frontend/tsconfig.*\.json
          )$
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: check-symlinks
      - id: destroyed-symlinks
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: forbid-new-submodules
      - id: no-commit-to-branch
        args: [--branch, main]

  # ------------------------------------------------------------------
  # Python — Ruff (lint + format)
  # ------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]
      - id: ruff-format
        types_or: [python, pyi]

  # ------------------------------------------------------------------
  # Python — Mypy strict (fallback for `ty` until stable on PyPI)
  # ------------------------------------------------------------------
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.1
    hooks:
      - id: mypy
        files: ^src/
        additional_dependencies:
          - pydantic>=2.10
          - pydantic-settings>=2.7.0
          - sqlalchemy[asyncio]>=2.0.36
          - cryptography>=46.0.0
          - argon2-cffi>=23.1.0
          - typer>=0.15.0
          - fastapi>=0.115.0
          - textual>=0.89.0
          - types-PyYAML
          - types-requests

  # ------------------------------------------------------------------
  # Python — Bandit (security static analysis)
  # ------------------------------------------------------------------
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        args: [-c, pyproject.toml, -r, src/]
        additional_dependencies: ["bandit[toml]"]

  # ------------------------------------------------------------------
  # Secrets detection
  # ------------------------------------------------------------------
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: |
          (?x)^(
              \.secrets\.baseline|
              docs/cahier-des-charges/.*|
              .*\.lock|
              package-lock\.json|
              (.*/)?pnpm-lock\.yaml|
              tests/unit/test_kat_vectors\.py|
              src/guardiabox/ui/tauri/frontend/src/i18n/.*\.json
          )$

  # ------------------------------------------------------------------
  # Conventional Commits (commit-msg hook)
  # ------------------------------------------------------------------
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.6.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - --strict
          - --force-scope
          - feat
          - fix
          - docs
          - style
          - refactor
          - perf
          - test
          - build
          - ci
          - chore
          - revert

  # ------------------------------------------------------------------
  # YAML / JSON / Markdown formatting
  # ------------------------------------------------------------------
  - repo: https://github.com/rbubley/mirrors-prettier
    rev: v3.4.2
    hooks:
      - id: prettier
        types_or: [yaml, json, markdown]
        exclude: |
          (?x)^(
              CHANGELOG\.md|
              docs/cahier-des-charges/.*|
              pnpm-lock\.yaml|
              src/guardiabox/ui/tauri/frontend/pnpm-lock\.yaml
          )$

  # ------------------------------------------------------------------
  # Frontend (TypeScript / React / Tauri) — Biome
  # Activated once frontend is scaffolded; remove the `exclude` then.
  # ------------------------------------------------------------------
  # - repo: https://github.com/biomejs/pre-commit
  #   rev: v0.6.1
  #   hooks:
  #     - id: biome-check
  #       additional_dependencies: ["@biomejs/biome@1.9.4"]

  # ------------------------------------------------------------------
  # GitHub Actions linting
  # ------------------------------------------------------------------
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.4
    hooks:
      - id: actionlint
