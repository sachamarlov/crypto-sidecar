; GuardiaBox Alembic configuration.
;
; The env.py is async-aware; runtime code calls alembic programmatically
; via ``alembic.command.upgrade`` + ``Config.set_main_option`` so the URL
; stays out of the repo. The ``sqlalchemy.url`` below is a placeholder
; used by ``alembic revision --autogenerate`` locally.

[alembic]
script_location = src/guardiabox/persistence/migrations
file_template = %%(year)d%%(month).2d%%(day).2d%%(hour).2d%%(minute).2d-%%(slug)s
prepend_sys_path = src
; Alembic 1.14+ asks for an explicit path separator. ``os`` uses
; ``os.pathsep`` on the current platform; a DeprecationWarning fires
; otherwise which our ``filterwarnings = error`` pytest config
; converts into a test failure.
path_separator = os
timezone = UTC
sqlalchemy.url = sqlite+aiosqlite:///.guardiabox.dev.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
