version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "github-actions"]
    commit-message:
      prefix: "ci"
      include: "scope"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "python"]
    commit-message:
      prefix: "build"
      include: "scope"
    versioning-strategy: increase-if-necessary
    groups:
      pytest:
        patterns:
          - "pytest*"
          - "hypothesis"
      cryptography:
        patterns:
          - "cryptography"
          - "argon2-cffi"
          - "zxcvbn"
          - "sqlcipher3*"
      sqlalchemy:
        patterns:
          - "sqlalchemy*"
          - "alembic"
          - "aiosqlite"
      fastapi:
        patterns:
          - "fastapi"
          - "uvicorn*"
          - "pydantic*"
          - "httpx"

  - package-ecosystem: "npm"
    directory: "/src/guardiabox/ui/tauri/frontend"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "javascript"]
    commit-message:
      prefix: "build"
      include: "scope"
    versioning-strategy: increase-if-necessary
    groups:
      tanstack:
        patterns:
          - "@tanstack/*"
      radix:
        patterns:
          - "@radix-ui/*"
      tauri-plugins:
        patterns:
          - "@tauri-apps/*"
      react-three:
        patterns:
          - "@react-three/*"
          - "three"
          - "@types/three"
      testing:
        patterns:
          - "@testing-library/*"
          - "vitest"
          - "@vitest/*"
          - "@playwright/test"
          - "axe-playwright"
          - "happy-dom"
          - "msw"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
          - "tw-animate-css"
          - "tailwind-merge"

  - package-ecosystem: "cargo"
    directory: "/src/guardiabox/ui/tauri/src-tauri"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "rust"]
    commit-message:
      prefix: "build"
      include: "scope"
    groups:
      tauri:
        patterns:
          - "tauri*"
