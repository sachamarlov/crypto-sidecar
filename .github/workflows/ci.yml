name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default minimal permissions; jobs elevate their own.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Python — lint / type / test / security
  # ---------------------------------------------------------------------------
  python:
    name: Python ${{ matrix.python }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python + project dependencies
        run: |
          uv python install ${{ matrix.python }}
          uv sync --extra dev --extra test

      - name: Lint (ruff)
        run: uv run ruff check --output-format=github .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (mypy strict)
        run: uv run mypy src

      - name: Security static analysis (bandit)
        run: uv run bandit -c pyproject.toml -r src -q

      - name: Dependency vulnerability audit (pip-audit)
        # `--skip-editable` excludes our own package (installed in editable
        # mode by `uv sync`, no PyPI presence). `--strict` is intentionally
        # dropped because it transforms the editable-skip into an error;
        # known-vulnerability detection on external deps still returns
        # exit code 1 without it -- only the "could not audit my own source"
        # false positive is silenced. See CLAUDE.md §9bis.
        #
        # --ignore-vuln=CVE-2026-3219 suppresses the current CVE on pip
        # itself (the installer, not one of our runtime deps). pip-audit
        # reports it but there is no fixed version published yet; pip is
        # only present at install time (build + CI), never shipped in our
        # distributable. Documented here and re-reviewed each CI touch.
        run: >-
          uv run pip-audit --skip-editable --progress-spinner=off
          --ignore-vuln=CVE-2026-3219

      - name: Secret scan baseline (detect-secrets)
        # `git ls-files -z | xargs -0` instead of `$(git ls-files)` so we
        # don't blow ARG_MAX on Windows once the repo grows.
        shell: bash
        run: |
          git ls-files -z | xargs -0 uv run detect-secrets-hook \
            --baseline .secrets.baseline

      - name: Run tests (unit + integration + property, excl. perf)
        # Perf benchmarks run in their own step below so CI reports show
        # NFR-1 / NFR-2 enforcement as a distinct line instead of hiding
        # it inside the general test summary.
        run: uv run pytest --maxfail=1 --ignore=tests/perf

      - name: Run performance benchmarks (NFR-1 AES-GCM, NFR-2 KDF)
        # Floors live in tests/perf/test_bench.py: >= 50 MiB/s AES-GCM
        # streaming (NFR-1 target is 100 MiB/s, CI band is lenient for
        # shared runners), KDF derivation in [10 ms, 5 s] (NFR-2).
        # A regression below either floor fails the build -- this is
        # the only CI job that catches a perf cliff before merge.
        run: uv run pytest tests/perf -v --no-cov

      - name: Coverage gates (core & security >= 95%)
        # Per-package floor from docs/CONVENTIONS.md section 13.
        # The global >= 80% gate is already enforced by --cov-fail-under
        # in pyproject.toml; this script adds the stricter contract for
        # crypto-sensitive modules by reading coverage.xml and applying
        # the per-path threshold.
        run: uv run python scripts/check_coverage_gates.py

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && always()
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # Frontend — lint / type / test (Tauri build covered by release workflow)
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend (Node 22)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: src/guardiabox/ui/tauri/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      # `cache: pnpm` requires pnpm-lock.yaml to exist; we omit it here and
      # rely on pnpm's own content-addressable store cache once the lockfile
      # has been committed in a follow-up PR.
      - uses: actions/setup-node@v6
        with:
          node-version: 22

      # The lockfile is generated locally on first `pnpm install`.
      # Until it is committed, the frontend job is a deliberate no-op so the
      # CI does not block on a Node toolchain that has nothing to verify.
      - name: Detect lockfile
        id: lockfile
        run: |
          if [ -f pnpm-lock.yaml ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::warning ::pnpm-lock.yaml not yet committed; frontend lint/test/typecheck skipped."
          fi

      - name: Install
        if: steps.lockfile.outputs.exists == 'true'
        run: pnpm install --frozen-lockfile

      - name: Lint (biome)
        if: steps.lockfile.outputs.exists == 'true'
        run: pnpm lint

      - name: Typecheck
        if: steps.lockfile.outputs.exists == 'true'
        run: pnpm typecheck

      - name: Unit tests (vitest)
        if: steps.lockfile.outputs.exists == 'true'
        run: pnpm test --run

      # The Rust job (below) compiles `tauri::generate_context!()` at
      # build-time, which validates that `bundle.frontendDist` (set to
      # `../frontend/dist` in tauri.conf.json) exists on disk. Without
      # this artefact, `cargo test` panics with `proc macro panicked /
      # The frontendDist configuration is set ... but this path doesn't
      # exist`. Mirroring the Sidecar PyInstaller pattern: build the
      # frontend here, upload `dist/` as an artefact, the Rust job
      # downloads it before invoking cargo.
      - name: Production build (Vite)
        if: steps.lockfile.outputs.exists == 'true'
        run: pnpm build

      - name: Upload frontend dist
        if: steps.lockfile.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: guardiabox-frontend-dist
          path: src/guardiabox/ui/tauri/frontend/dist
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Sidecar build (Linux) — produces the PyInstaller artefact the Rust job
  # consumes. Phase G-16: makes `tauri::generate_context!()` happy by
  # populating `src-tauri/binaries/` so Rust clippy can finally pass.
  # ---------------------------------------------------------------------------
  sidecar-build-linux:
    name: Sidecar PyInstaller (Linux)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python + project + build deps
        run: |
          uv python install 3.12
          uv sync --extra build

      - name: Build sidecar binary
        run: uv run python scripts/build_sidecar.py --release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: guardiabox-sidecar-x86_64-unknown-linux-gnu
          path: src/guardiabox/ui/tauri/src-tauri/binaries/guardiabox-sidecar-*
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Rust (Tauri shell) — fmt + clippy
  # ---------------------------------------------------------------------------
  # Now consumes the sidecar artefact from the build job above so
  # `tauri::generate_context!()` does not panic on missing externalBin.
  # ---------------------------------------------------------------------------
  rust:
    name: Rust (Tauri shell)
    runs-on: ubuntu-latest
    needs: [sidecar-build-linux, frontend]
    permissions:
      contents: read
    defaults:
      run:
        working-directory: src/guardiabox/ui/tauri/src-tauri

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Tauri system deps (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev

      - name: Download sidecar artefact
        uses: actions/download-artifact@v4
        with:
          name: guardiabox-sidecar-x86_64-unknown-linux-gnu
          path: src/guardiabox/ui/tauri/src-tauri/binaries
        # working-directory does not apply to actions; the path above is
        # repo-root relative and matches `bundle.externalBin`.

      - name: Download frontend dist
        # tauri::generate_context!() validates bundle.frontendDist
        # (../frontend/dist) at compile time; download the artefact
        # produced by the `frontend` job so cargo test can succeed.
        uses: actions/download-artifact@v4
        with:
          name: guardiabox-frontend-dist
          path: src/guardiabox/ui/tauri/frontend/dist

      - name: Mark sidecar binary executable
        run: chmod +x binaries/guardiabox-sidecar-*

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/guardiabox/ui/tauri/src-tauri -> target

      - name: Generate Cargo.lock if missing
        run: |
          if [ ! -f Cargo.lock ]; then cargo generate-lockfile; fi

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Cargo test (parser + handshake unit tests)
        run: cargo test --all-features
