name: Rust

# Currently advisory-only (does not gate `main`) due to an upstream proc-macro
# incompatibility in the Tauri 2.10 plugin set. Status visible at:
# https://github.com/sachamarlov/crypto-sidecar/actions/workflows/rust.yml

on:
  push:
    branches: [main]
    paths:
      - "src/guardiabox/ui/tauri/src-tauri/**"
      - ".github/workflows/rust.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/guardiabox/ui/tauri/src-tauri/**"
      - ".github/workflows/rust.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust:
    name: Tauri shell (advisory)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: src/guardiabox/ui/tauri/src-tauri

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Tauri system deps (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/guardiabox/ui/tauri/src-tauri -> target

      - name: Generate Cargo.lock if missing
        run: |
          if [ ! -f Cargo.lock ]; then cargo generate-lockfile; fi

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
